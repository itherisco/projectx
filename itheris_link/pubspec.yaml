# Itheris Link - Neural Interface Client
# Flutter Application for Itheris AI Kernel

name: itheris_link
description: "The Neural Link - A secure, real-time client for the Itheris AI Kernel"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ==========================================
  # CORE NETWORKING & SECURITY
  # ==========================================
  
  # WebSocket for real-time thought events
  web_socket_channel: ^2.4.0
  
  # Secure storage for sovereign keys
  flutter_secure_storage: ^9.0.0
  
  # HTTP client with interceptors
  dio: ^5.3.3
  
  # Certificate pinning for E2EE
  certificate_pinning: ^2.0.0
  
  # ==========================================
  # STATE MANAGEMENT
  # ==========================================
  
  # BLoC pattern for complex state
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  
  # Reactive streams
  rxdart: ^0.27.7
  
  # Equatable for state comparison
  equatable: ^2.0.5
  
  # ==========================================
  # UI COMPONENTS
  # ==========================================
  
  # Animations
  flutter_animate: ^4.3.0
  
  # Swipe gestures for authorization
  flutter_card_swiper: ^6.0.0
  
  # Bubble chat UI
  flutter_chat_ui: ^1.6.6
  
  # Material design enhancements
  material_design_icons_flutter: ^7.0.7296
  
  # ==========================================
  # LOCAL NOTIFICATIONS
  # ==========================================
  
  # Push notifications
  flutter_local_notifications: ^17.0.0
  
  # Notification permissions
  permission_handler: ^11.1.0
  
  # ==========================================
  # UTILITIES
  # ==========================================
  
  # UUID generation
  uuid: ^4.2.1
  
  # JSON serialization
  json_annotation: ^4.8.1
  
  # Date/time formatting
  intl: ^0.18.1
  
  # Crypto for key exchange
  crypto: ^3.0.3
  
  # Get it - Service locator
  get_it: ^7.6.4
  
  # Path provider for storage
  path_provider: ^2.1.1
  
  # Shared preferences
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
  
  fonts:
    - family: Itheris
      fonts:
        - asset: assets/fonts/Itheris-Regular.ttf
        - asset: assets/fonts/Itheris-Bold.ttf
          weight: 700
