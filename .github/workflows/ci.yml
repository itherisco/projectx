        end
        
        # Test: test_emotional_causal_integration.jl
        println("\n>>> EXECUTING: test_emotional_causal_integration.jl")
        try
            include("tests/test_emotional_causal_integration.jl")
            println("✓ test_emotional_causal_integration.jl executed")
            total_tests += 1
            passed_tests += 1
        catch e
            println("✗ test_emotional_causal_integration.jl failed: ", e)
            total_tests += 1
            failed_tests += 1
        end
        
        println("\n========================================")
        println("INTEGRATION TEST RESULTS SUMMARY")
        println("========================================")
        println("Total test files: ", total_tests)
        println("Passed: ", passed_tests)
        println("Failed: ", failed_tests)
        println("========================================")
        
        open("test_results_integration.txt", "w") do f
            write(f, "Integration Test Results\n")
            write(f, "========================\n")
            write(f, "Total: $total_tests\n")
            write(f, "Passed: $passed_tests\n")
            write(f, "Failed: $failed_tests\n")
        end
        
        exit(failed_tests > 0 ? 1 : 0)
        ' || echo "Integration tests exited with code: $?"
      continue-on-error: true
    
    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: adaptive-kernel/test_results_integration.txt
        retention-days: 30

  # ===== STRESS TESTS =====
  test-stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    needs: [julia-build]
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'
    
    - name: Cache Julia packages
      uses: julia-actions/cache@v1
    
    - name: Run stress tests with evidence
      run: |
        cd adaptive-kernel
        julia --project=. -e '
        using Pkg
