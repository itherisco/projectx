  # ===== COVERAGE =====
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [julia-build]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'
    
    - name: Cache Julia packages
      uses: julia-actions/cache@v1
    
    - name: Generate test environment for coverage
      run: |
        cd adaptive-kernel
        julia --project=. -e 'using Pkg; Pkg.add("Coverage")'
    
    - name: Run code coverage
      run: |
        cd adaptive-kernel
        julia --project=. -e '
        using Pkg
        try
            using Coverage
            println("========================================")
            println("CODE COVERAGE ANALYSIS")
            println("========================================")
            
            # Collect coverage data
            coverage = process_folder(".")
            println("Total lines covered: ", length(coverage))
            
            # Calculate coverage percentage
            covered = count(coverage)
            total = length(coverage)
            percentage = total > 0 ? (covered / total) * 100 : 0
            
            println("Covered lines: ", covered)
            println("Total lines: ", total)
            println("Coverage: ", round(percentage, digits=2), "%")
            println("========================================")
            
            # Save coverage results
            open("coverage_results.txt", "w") do f
                write(f, "Code Coverage Results\n")
                write(f, "=====================\n")
                write(f, "Covered: $covered\n")
                write(f, "Total: $total\n")
                write(f, "Percentage: $(round(percentage, digits=2))%\n")
            end
        catch e
            println("Coverage analysis skipped: ", e)
            open("coverage_results.txt", "w") do f
                write(f, "Coverage analysis failed: $e\n")
            end
        end
        '
      continue-on-error: true
    
    - name: Upload coverage results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-results
        path: adaptive-kernel/coverage_results.txt
        retention-days: 30

  # ===== TEST SUMMARY =====
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-stress, test-security, coverage]
    if: always()
    
    steps:
    - name: Download all test artifacts
      uses: actions/download-artifact@v4
      with:
        path: test-results
    
    - name: Generate comprehensive test report
      run: |
        echo "========================================"
        echo "COMPREHENSIVE TEST EXECUTION REPORT"
        echo "========================================"
        echo ""
        
        echo "=== TEST EXECUTION EVIDENCE ==="
        
        # Process all test result files
        for dir in test-results/*/; do
            if [ -d "$dir" ]; then
                echo ""
                echo "--- $(basename $dir) ---"
                cat "$dir"*.txt 2>/dev/null || echo "No results"
            fi
        done
        
        # Count @test assertions
        TEST_COUNT=$(grep -r "@test" adaptive-kernel/tests/*.jl 2>/dev/null | wc -l)
        TEST_FILE_COUNT=$(ls -1 adaptive-kernel/tests/*.jl 2>/dev/null | wc -l)
        
        echo ""
        echo "=== TEST ASSERTION SUMMARY ==="
        echo "Total @test assertions found: $TEST_COUNT"
        echo "Total test files: $TEST_FILE_COUNT"
        echo "========================================"
        
        # Write to GitHub step summary
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- Total @test assertions: $TEST_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- Total test files: $TEST_FILE_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
    
    - name: Check for failures
      run: |
        echo "========================================"
        echo "CHECKING FOR FAILURES"
        echo "========================================"
        
        # Check if any tests failed
        FAILED=0
        for dir in test-results/*/; do
            if [ -d "$dir" ]; then
                for file in "$dir"*.txt; do
                    if [ -f "$file" ]; then
                        if grep -q "Failed: [1-9]" "$file"; then
                            echo "FAILURE DETECTED in $(basename $dir): $file"
                            FAILED=1
                        fi
                    fi
                done
            fi
        done
        
        if [ $FAILED -eq 1 ]; then
            echo "Some tests failed. Please review the results."
            exit 1
        else
            echo "All tests passed!"
        fi

  # ===== NOTIFICATION =====
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: failure()
    
    steps:
    - name: Send failure notification
      run: |
        echo "## CI/CD Pipeline Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The CI/CD pipeline has failed. Please review the logs and fix any issues." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Common Issues" >> $GITHUB_STEP_SUMMARY
        echo "- Check test logs for failing assertions" >> $GITHUB_STEP_SUMMARY
        echo "- Review security test results" >> $GITHUB_STEP_SUMMARY
        echo "- Verify Rust compilation" >> $GITHUB_STEP_SUMMARY
        
        # Create GitHub issue comment
        echo "::notice::CI/CD pipeline completed with failures. Check the workflow run for details."
