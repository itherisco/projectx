<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITHERIS Console - ProjectX Jarvis (WASM)</title>
    <meta name="description" content="Zero-install browser interface for ITHERIS Full OS Interface">
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            background: #0a0a0f;
            color: #e4e4e7;
        }
        
        /* Loading state */
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #2d2d44;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 16px;
            color: #a1a1aa;
            font-size: 14px;
        }
        
        /* Error state */
        #error {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 24px;
            text-align: center;
        }
        
        #error h2 {
            color: #ef4444;
            margin-bottom: 8px;
        }
        
        #error p {
            color: #a1a1aa;
            max-width: 400px;
        }
        
        .error-details {
            margin-top: 16px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-size: 12px;
            max-width: 500px;
            overflow-x: auto;
        }
        
        /* Root element for Leptos mounting */
        #app {
            height: 100vh;
            width: 100vw;
        }
        
        /* Connection status indicator */
        .connection-status {
            position: fixed;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            z-index: 1000;
            display: none;
        }
        
        .connection-status.connected {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: block;
        }
        
        .connection-status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        
        .connection-status.connecting {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
            display: block;
        }
    </style>
</head>
<body>
    <!-- Connection status indicator -->
    <div id="connection-status" class="connection-status connecting">Connecting...</div>
    
    <!-- Loading state -->
    <div id="loading">
        <div class="loader"></div>
        <p class="loading-text">Initializing ITHERIS Console...</p>
    </div>
    
    <!-- Error state -->
    <div id="error">
        <h2>Initialization Failed</h2>
        <p>The ITHERIS Console could not be loaded. Please check your network connection and try again.</p>
        <div class="error-details" id="error-details"></div>
    </div>
    
    <!-- Application root -->
    <div id="app"></div>
    
    <script type="module">
        // Configuration
        const GRPC_WEB_ENDPOINT = window.GRPC_WEB_ENDPOINT || 'http://localhost:8080';
        
        // Import the WASM module
        import init from './pkg/itheris_console.js';
        
        async function run() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const errorDetailsEl = document.getElementById('error-details');
            const connectionStatusEl = document.getElementById('connection-status');
            
            try {
                // Initialize WASM module
                await init();
                
                // Update connection status
                connectionStatusEl.className = 'connection-status connected';
                connectionStatusEl.textContent = 'Connected to ITHERIS';
                
                // Hide loading indicator
                loadingEl.style.display = 'none';
                
                // Log successful initialization
                console.log('ITHERIS Console initialized successfully');
                console.log('gRPC-Web endpoint:', GRPC_WEB_ENDPOINT);
                
            } catch (error) {
                console.error('Failed to initialize ITHERIS Console:', error);
                
                // Hide loading, show error
                loadingEl.style.display = 'none';
                errorEl.style.display = 'flex';
                
                // Show error details
                errorDetailsEl.textContent = error.message || String(error);
                
                // Update connection status
                connectionStatusEl.className = 'connection-status disconnected';
                connectionStatusEl.textContent = 'Connection Failed';
            }
        }
        
        // Run the application
        run();
    </script>
</body>
</html>
