<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITHERIS Console - ProjectX Jarvis</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            background: #0a0a0f;
            color: #e4e4e7;
        }
        
        /* Loading state */
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #2d2d44;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Root element for Leptos mounting */
        #app {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
    </div>
    <div id="app"></div>
    <script type="module">
        // Import the WASM module
        import init from './pkg/itheris_console.js';
        
        async function run() {
            try {
                await init();
                
                // Hide loading indicator
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Failed to initialize ITHERIS Console:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ef4444; text-align: center;">
                        <h2>Initialization Failed</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        run();
    </script>
</body>
</html>
