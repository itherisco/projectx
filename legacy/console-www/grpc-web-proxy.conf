# gRPC-Web Proxy Configuration
# 
# This configuration sets up nginx as a gRPC-Web proxy to forward
# browser-based gRPC requests to the Warden gRPC service.
#
# Usage:
#   1. Install nginx with grpc-web module support
#   2. Copy this file to /etc/nginx/sites-available/itheris-grpc-web
#   3. Create symlink to /etc/nginx/sites-enabled/
#   4. Update the Warden gRPC endpoint below
#   5. Restart nginx
#
# For production, consider using envoy-proxy instead of nginx
# as it has native gRPC-Web support.

server {
    listen 8080;
    server_name localhost;

    # Health check endpoint
    location /health {
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # gRPC-Web endpoint - forwards to Warden gRPC service
    location /WardenService/ {
        # Change this to your Warden gRPC server address
        # Format: grpc://host:port or grpcs://host:port for TLS
        grpc_pass grpc://localhost:50051;
        
        # Required headers for gRPC-Web
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for streaming
        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;
    }

    # Optional: Serve static WASM files from same origin
    # Uncomment if hosting WASM files directly
    # location / {
    #     root /var/www/itheris-console;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    #     
    #     # CORS headers for WASM
    #     add_header Access-Control-Allow-Origin *;
    #     add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    #     add_header Access-Control-Allow-Headers "Content-Type, X-User-Agent, Authorization";
    #     
    #     # Handle preflight
    #     if ($request_method = OPTIONS) {
    #         return 204;
    #     }
    # }
}

