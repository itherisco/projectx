# Rust Warden - Cargo Configuration
# Target: x86_64-unknown-none for bare-metal hypervisor

[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
# Rust flags for no_std bare-metal environment
rustflags = [
    "-C", "target-feature=+vmx",  # Enable VMX (Intel VT-x)
    "-C", "target-feature=+svm",  # Enable SVM (AMD-V)
    "-C", "target-feature=+fxsr",  # Enable FXSAVE/FXRSTOR
    "-C", "target-feature=+xsave",  # Enable XSAVE/XRSTOR
    "-C", "target-feature=+xsaveopt",  # Enable XSAVEOPT
    "-C", "target-feature=+pcid",  # Enable PCID
    "-C", "target-feature=+invpcid",  # Enable INVPCID
    "-C", "target-feature=+rdtscp",  # Enable RDTSCP
    "-C", "target-feature=+tm2",  # Enable SMEP
    "-C", "target-feature=+smap",  # Enable SMAP
    "-C", "target-feature=+rdrand",  # Enable RDRAND
    "-C", "target-feature=+rdseed",  # Enable RDSEED
    "-C", "panic=abort",  # Abort on panic (no unwinding)
    "-C", "lto=fat",  # Enable LTO for smaller binaries
    "-C", "opt-level=z",  # Optimize for size
    "-C", "codegen-units=1",  # Single codegen unit for optimization
]

# Linker configuration for bare-metal
linker = "ld"
linker-flavor = "elf"

[profile.release]
opt-level = "z"  # Optimize for size
lto = true       # Link-time optimization
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true

[features]
default = ["mock", "std"]
mock = []  # Use mock implementations for testing
std = []   # Standard library support

[dependencies]
# Core dependencies
bitflags = "2.4"
volatile = "0.5"
spin = "0.9"

# Testing
[dev-dependencies]
rand = "0.8"
once_cell = "1.19"
